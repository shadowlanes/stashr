services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "4102:5432"
    environment:
      POSTGRES_USER: stashr
      POSTGRES_PASSWORD: stashr
      POSTGRES_DB: stashr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stashr -d stashr"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "4104:9000"   # S3-compatible API
      - "4105:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: stashr
      MINIO_ROOT_PASSWORD: stashr123
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot container that creates the bucket on first run
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 stashr stashr123 &&
        mc mb --ignore-existing local/stashr-articles &&
        echo 'Bucket ready.'
      "

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4101:4101"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - services/api/.env
    volumes:
      # Hot reload: mount source so tsx watch picks up changes
      - ./services/api/src:/app/services/api/src
      - ./packages/db/src:/app/packages/db/src
    working_dir: /app

  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - services/api/.env
    command: ["pnpm", "--filter", "@stashr/db", "migrate"]
    working_dir: /app
    profiles:
      - migrate

volumes:
  pgdata:
  miniodata:
